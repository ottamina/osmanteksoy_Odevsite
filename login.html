<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Teknolojileri Dersi Proje - Giriş Sayfası">
    <title>Giriş | Kişisel Portfolyo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-body {
            background: var(--bg-dark);
            min-height: 100vh;
        }

        .login-bg-shapes {
            display: none;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid rgba(74, 108, 247, 0.2);
            border-radius: var(--radius);
            padding: 36px;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 26px;
            color: #fff;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-floating-custom {
            margin-bottom: 18px;
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            z-index: 2;
            font-size: 0.9rem;
        }

        .input-group-custom .form-control {
            background: var(--bg-card2);
            border: 1px solid rgba(74, 108, 247, 0.2);
            color: var(--text);
            padding: 11px 14px 11px 38px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .input-group-custom .form-control:focus {
            border-color: var(--primary);
            box-shadow: none;
            background: var(--bg-card2);
        }

        .input-group-custom label {
            position: absolute;
            top: -8px;
            left: 34px;
            font-size: 0.7rem;
            color: var(--primary);
            background: var(--bg-card);
            padding: 0 5px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-login:hover {
            background: var(--primary-dark);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-footer code {
            color: var(--primary);
            background: rgba(74, 108, 247, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body class="login-body">
    <div class="login-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card" id="loginCard">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h1>Hoş Geldiniz</h1>
                <p>Portfolyo sistemine giriş yapın</p>
            </div>

            <form id="loginForm" action="login.php" method="POST" novalidate>
                <div class="form-floating-custom">
                    <div class="input-group-custom">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" name="email" class="form-control"
                            placeholder="b2412100001@sakarya.edu.tr" required>
                        <label for="loginEmail">Öğrenci E-posta</label>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-floating-custom">
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" name="password" class="form-control"
                            placeholder="Şifre" required>
                        <label for="loginPassword">Şifre (Öğrenci No)</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Beni Hatırla</label>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Giriş Yap</span>
                    <span class="btn-loader" style="display:none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <p>Format: <code>b2412100001@ogr.sakarya.edu.tr</code></p>
                <p>Şifre: Sadece öğrenci numarası (örn: <code>b2412100001</code>)</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="site.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initLogin();
        });
    </script>
</body>

</html>
