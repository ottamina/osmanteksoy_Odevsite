<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Teknolojileri Dersi Proje - Giriş Sayfası">
    <title>Giriş | Kişisel Portfolyo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card" id="loginCard">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h1>Hoş Geldiniz</h1>
                <p>Portfolyo sistemine giriş yapın</p>
            </div>

            <form id="loginForm" action="login.php" method="POST" novalidate>
                <div class="form-floating-custom">
                    <div class="input-group-custom">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" name="email" class="form-control" 
                               placeholder="b2412100001@sakarya.edu.tr" required>
                        <label for="loginEmail">Öğrenci E-posta</label>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-floating-custom">
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" name="password" class="form-control" 
                               placeholder="Şifre" required>
                        <label for="loginPassword">Şifre (Öğrenci No)</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Beni Hatırla</label>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Giriş Yap</span>
                    <span class="btn-loader" style="display:none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <p>Format: <code>b2412100001@ogr.sakarya.edu.tr</code></p>
                <p>Şifre: Sadece öğrenci numarası (örn: <code>b2412100001</code>)</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="site.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initLogin();
        });
    </script>
</body>
</html>
