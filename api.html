<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Film keşfet - API entegrasyonu ile popüler filmler">
    <title>Filmler | Kişisel Portfolyo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .api-search-bar {
            background: var(--bg-card);
            border: 1px solid rgba(74, 108, 247, 0.1);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input-wrapper .form-control {
            padding-left: 36px;
        }

        .movie-card {
            background: var(--bg-card);
            border: 1px solid rgba(74, 108, 247, 0.1);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            height: 100%;
        }

        .movie-card:hover {
            border-color: var(--primary);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: var(--bg-card2);
        }

        .movie-info {
            padding: 14px;
        }

        .movie-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .movie-rating {
            color: var(--warning);
            font-weight: 700;
        }

        .movie-rating i {
            margin-right: 3px;
        }

        .loading-spinner {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(74, 108, 247, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .movie-modal-content {
            background: var(--bg-card) !important;
            border: 1px solid rgba(74, 108, 247, 0.15);
            border-radius: var(--radius);
            color: var(--text);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-code"></i> Portfolyom
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Hakkımda</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="cv.html"><i class="fas fa-file-alt"></i> Özgeçmiş</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html"><i class="fas fa-city"></i> Şehir</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="miras.html"><i class="fas fa-futbol"></i> Takımım</a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="api.html"><i class="fas fa-film"></i>
                            Filmler</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html"><i class="fas fa-envelope"></i>
                            İletişim</a></li>
                </ul>
                <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0">
                    <a href="login.html" class="btn btn-outline-light"><i class="fas fa-sign-in-alt"></i> Giriş Yap</a>
                </div>
                <div class="nav-user-info ms-3" id="navUserInfo"></div>
            </div>
        </div>
    </nav>


    <header class="page-header page-header-api">
        <div class="container">
            <h1><i class="fas fa-film"></i> Film Keşfet</h1>

        </div>
    </header>


    <section class="section-padding">
        <div class="container">
            <div class="api-search-bar">
                <div class="row g-3 align-items-center">
                    <div class="col-lg-5">
                        <div class="search-input-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="movieSearch" class="form-control" placeholder="Film ara...">
                        </div>
                    </div>
                    <div class="col-lg-3">
                        <select id="genreFilter" class="form-select">
                            <option value="">Tüm Türler</option>
                            <option value="28">Aksiyon</option>
                            <option value="35">Komedi</option>
                            <option value="18">Dram</option>
                            <option value="27">Korku</option>
                            <option value="878">Bilim Kurgu</option>
                            <option value="10749">Romantik</option>
                            <option value="16">Animasyon</option>
                            <option value="53">Gerilim</option>
                        </select>
                    </div>
                    <div class="col-lg-2">
                        <select id="sortFilter" class="form-select">
                            <option value="popularity.desc">Popülerlik</option>
                            <option value="vote_average.desc">Puan</option>
                            <option value="release_date.desc">Yeni</option>
                        </select>
                    </div>
                    <div class="col-lg-2">
                        <button class="btn-primary-custom w-100" id="searchBtn" onclick="searchMovies()">
                            <i class="fas fa-search"></i> Ara
                        </button>
                    </div>
                </div>
            </div>


            <div class="loading-spinner" id="loadingSpinner" style="display: none;">
                <div class="spinner"></div>
                <p>Filmler yükleniyor...</p>
            </div>


            <div class="row g-4" id="moviesGrid">

            </div>


            <div class="text-center mt-5" id="loadMoreContainer" style="display: none;">
                <button class="btn-outline-custom" id="loadMoreBtn" onclick="loadMoreMovies()">
                    <i class="fas fa-plus"></i> Daha Fazla Göster
                </button>
            </div>


            <div class="modal fade" id="movieModal" tabindex="-1">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content movie-modal-content">
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Kapat" style="position:absolute;top:15px;right:15px;z-index:10;"></button>
                        <div class="modal-body p-0" id="movieModalBody">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <p>&copy; 2026 Osman TEKSOY. Tüm hakları saklıdır.</p>
                </div>
                <div class="col-md-4 text-center">
                    <p>Veriler <a href="https://www.themoviedb.org/" target="_blank" style="color:#818cf8;">TMDB API</a>
                        tarafından sağlanmaktadır.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <p>Web Teknolojileri Dersi Projesi</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="site.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            checkLoginStatus();
            initNavbar();
            loadPopularMovies();
        });
    </script>
</body>

</html>
